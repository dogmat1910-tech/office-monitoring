<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>office-monitoring · дашборд</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --online: #4ade80;
      --offline: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 { font-size: 18px; margin: 0; font-weight: 600; }
    .muted { color: var(--muted); }
    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 50px);
    }
    aside {
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
    }
    section { padding: 16px 20px; overflow-y: auto; }
    .agent {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 6px;
      border: 1px solid transparent;
    }
    .agent:hover { background: var(--panel); }
    .agent.selected { border-color: var(--accent); background: var(--panel); }
    .agent .name { font-weight: 600; }
    .agent .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .dot.online { background: var(--online); }
    .dot.offline { background: var(--offline); }
    h2 { font-size: 15px; margin: 18px 0 10px; font-weight: 600; }
    .panel { background: var(--panel); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .bar-row { display: grid; grid-template-columns: 200px 1fr 80px; gap: 10px; align-items: center; padding: 4px 0; }
    .bar-row .name { font-weight: 500; }
    .bar-row .bar-bg { background: #0b1220; border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-row .bar-fill { background: var(--accent); height: 100%; }
    .bar-row .num { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
    .controls { display: flex; gap: 10px; align-items: center; }
    .controls select, .controls button {
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; font-size: 13px;
    }
    .controls button { cursor: pointer; }
    .controls button:hover { border-color: var(--accent); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .empty { color: var(--muted); padding: 12px; text-align: center; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 6px;
    }
    .badge.meeting { background: #b91c1c; color: white; }
    .meeting-info { margin-top: 6px; padding: 6px 8px; background: #7f1d1d; border-radius: 6px; font-size: 12px; }
    .meeting-info .client { font-weight: 600; }
    .meeting-info .since { color: #fecaca; }
    .actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .btn-sim {
      background: #b45309; color: white; border: none; border-radius: 6px;
      padding: 6px 10px; font-size: 12px; cursor: pointer;
    }
    .btn-sim:hover { background: #d97706; }
    .btn-sim.stop { background: #b91c1c; }
    .btn-sim.stop:hover { background: #dc2626; }
    .score {
      display: inline-block; padding: 2px 12px; border-radius: 14px;
      font-weight: 700; font-size: 18px; margin-left: 10px;
    }
    .score.low { background: #7f1d1d; color: #fecaca; }
    .score.mid { background: #92400e; color: #fde68a; }
    .score.high { background: #14532d; color: #bbf7d0; }
    .checklist-section { margin: 10px 0; }
    .checklist-section h3 { font-size: 13px; font-weight: 600; margin: 8px 0; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .check-item { display: grid; grid-template-columns: 24px 1fr; gap: 8px; padding: 4px 0; align-items: start; }
    .check-status { font-size: 14px; line-height: 20px; text-align: center; }
    .check-status.yes { color: #4ade80; }
    .check-status.no { color: #f87171; }
    .check-status.na { color: #94a3b8; }
    .check-text { font-size: 13px; line-height: 1.4; }
    .check-comment { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 2px; }
    .err-box { background: #7f1d1d; border-radius: 6px; padding: 8px 10px; margin: 4px 0; font-size: 13px; }
    .err-box .quote { color: #fecaca; font-style: italic; margin-top: 4px; font-size: 12px; }
    .summary-box { background: #1e3a5f; border-radius: 6px; padding: 10px 12px; margin: 10px 0; line-height: 1.5; }
    .twocol { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px; }
    .twocol h4 { font-size: 13px; margin: 0 0 6px; color: var(--muted); font-weight: 600; }
    .twocol ul { margin: 0; padding-left: 20px; line-height: 1.5; font-size: 13px; }
    .bar-fill.work { background: #4ade80; }
    .bar-fill.personal { background: #f87171; }
    .bar-fill.neutral { background: #94a3b8; }
    .cat-select {
      background: #0b1220; color: var(--text); border: 1px solid var(--border);
      border-radius: 4px; font-size: 11px; padding: 2px 4px;
    }
    .day-summary {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px;
    }
    .day-tile {
      background: #0b1220; border-radius: 8px; padding: 10px 12px;
      border-left: 4px solid var(--muted);
    }
    .day-tile.work { border-left-color: #4ade80; }
    .day-tile.personal { border-left-color: #f87171; }
    .day-tile.neutral { border-left-color: #94a3b8; }
    .day-tile.meeting { border-left-color: #fbbf24; }
    .day-tile .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .day-tile .value { font-size: 20px; font-weight: 700; margin-top: 2px; }
    .token-input {
      width: 100%; box-sizing: border-box; background: #0b1220; color: var(--text);
      border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px;
      font-family: ui-monospace, monospace; font-size: 12px; margin-top: 4px;
    }
</style>
</head>
<body>
  <header>
    <h1>office-monitoring</h1>
    <div class="controls">
      <label class="muted">период:
        <select id="hours">
          <option value="1">1 час</option>
          <option value="8" selected>8 часов</option>
          <option value="24">24 часа</option>
          <option value="168">7 дней</option>
        </select>
      </label>
      <button id="refresh">обновить</button>
      <span id="updated" class="muted"></span>
    </div>
  </header>
  <main>
    <aside>
      <h2>Агенты</h2>
      <div id="agents"></div>
      <h2 style="margin-top: 20px;">API-токен (для теста встреч)</h2>
      <input type="password" id="apiToken" class="token-input" placeholder="вставь токен сюда" autocomplete="off">
      <div class="muted" style="font-size: 11px; margin-top: 4px;">хранится в браузере, нужен для кнопок симуляции встречи</div>
    </aside>
    <section>
      <div class="panel">
        <h2 style="margin-top: 0;">Сводка дня</h2>
        <div id="daySummary"></div>
      </div>
      <div class="panel">
        <h2 style="margin-top: 0;">Встречи</h2>
        <div id="meetings"></div>
      </div>
      <div class="panel" id="analysisPanel" style="display:none">
        <h2 style="margin-top: 0;">Анализ встречи <span id="analysisMeetingId" class="muted"></span> <span id="analysisScore"></span></h2>
        <div id="analysisMeta" class="muted" style="font-size: 12px; margin-bottom: 10px;"></div>
        <div id="analysisContent"></div>
      </div>
      <div class="panel" id="transcriptPanel" style="display:none">
        <h2 style="margin-top: 0;">Транскрипт встречи <span id="transcriptMeetingId" class="muted"></span></h2>
        <div id="transcriptMeta" class="muted" style="font-size: 12px; margin-bottom: 10px;"></div>
        <div id="transcriptText" style="line-height: 1.6; white-space: pre-wrap;"></div>
      </div>
      <div class="panel">
        <h2 style="margin-top: 0;">Последние окна</h2>
        <div id="windows"></div>
      </div>
    </section>
  </main>
  <script>
    const $ = (s) => document.querySelector(s);
    const fmtSec = (s) => {
      if (s < 60) return s + " с";
      const m = Math.floor(s / 60), sec = s % 60;
      if (m < 60) return m + " мин " + sec + " с";
      const h = Math.floor(m / 60), mm = m % 60;
      return h + " ч " + mm + " мин";
    };
    const fmtTime = (iso) => {
      const d = new Date(iso);
      return d.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    };

    let selectedAgent = null;

    async function loadAgents() {
      const r = await fetch("/agents");
      const agents = await r.json();
      const el = $("#agents");
      if (!agents.length) {
        el.innerHTML = '<div class="empty">нет агентов</div>';
        return;
      }
      el.innerHTML = agents.map(a => {
        const meetingHtml = a.active_meeting ? `
          <div class="meeting-info">
            <div><span class="client">${escapeHTML(a.active_meeting.client_name || "встреча")}</span></div>
            <div class="since">с ${fmtTime(a.active_meeting.started_at)}</div>
          </div>
          <div class="actions">
            <button class="btn-sim stop" data-stop="${a.agent_id}">⏹ остановить</button>
          </div>` : `
          <div class="actions">
            <button class="btn-sim" data-start="${a.agent_id}">▶ симулировать встречу</button>
          </div>`;
        return `
          <div class="agent ${a.agent_id === selectedAgent ? 'selected' : ''}" data-id="${a.agent_id}">
            <div class="name">
              <span class="dot ${a.online ? 'online' : 'offline'}"></span>${escapeHTML(a.hostname)}
              ${a.active_meeting ? '<span class="badge meeting">🔴 встреча</span>' : ''}
            </div>
            <div class="meta">${escapeHTML(a.username)} · ${a.online ? 'online' : 'offline'}</div>
            ${meetingHtml}
          </div>`;
      }).join("");
      el.querySelectorAll(".agent").forEach(node => {
        node.addEventListener("click", (e) => {
          if (e.target.closest(".btn-sim")) return;
          selectedAgent = node.dataset.id;
          loadAgents();
          loadAgentData();
        });
      });
      el.querySelectorAll("[data-start]").forEach(btn => {
        btn.addEventListener("click", () => startMeeting(btn.dataset.start));
      });
      el.querySelectorAll("[data-stop]").forEach(btn => {
        btn.addEventListener("click", () => stopMeeting(btn.dataset.stop));
      });
      if (!selectedAgent && agents.length) {
        selectedAgent = agents[0].agent_id;
        loadAgents();
        loadAgentData();
      }
    }

    async function loadAgentData() {
      if (!selectedAgent) return;
      const hours = $("#hours").value;
      const [daySummaryR, windowsR, meetingsR] = await Promise.all([
        fetch(`/agents/${selectedAgent}/day_summary?hours=${hours}`),
        fetch(`/agents/${selectedAgent}/windows?limit=50`),
        fetch(`/meetings?agent_id=${selectedAgent}&limit=20`),
      ]);
      const daySummary = await daySummaryR.json();
      const windows = await windowsR.json();
      const meetings = await meetingsR.json();
      renderDaySummary(daySummary);
      renderWindows(windows);
      renderMeetings(meetings);
      $("#updated").textContent = "обновлено " + fmtTime(new Date().toISOString());
    }

    function getToken() {
      let t = $("#apiToken").value.trim();
      if (!t) t = localStorage.getItem("omToken") || "";
      if (t) localStorage.setItem("omToken", t);
      return t;
    }

    async function startMeeting(agentId) {
      const token = getToken();
      if (!token) { alert("вставь API-токен в поле слева"); return; }
      const client = prompt("Имя клиента (опционально):", "Тест-клиент") ?? "";
      const r = await fetch("/meeting/start", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ agent_id: agentId, client_name: client || null }),
      });
      if (!r.ok) { alert("Ошибка: " + r.status + " " + await r.text()); return; }
      loadAgents(); loadAgentData();
    }

    async function stopMeeting(agentId) {
      const token = getToken();
      if (!token) { alert("вставь API-токен в поле слева"); return; }
      const r = await fetch("/meeting/stop", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ agent_id: agentId }),
      });
      if (!r.ok) { alert("Ошибка: " + r.status + " " + await r.text()); return; }
      loadAgents(); loadAgentData();
    }

    function renderMeetings(meetings) {
      const el = $("#meetings");
      if (!meetings.length) {
        el.innerHTML = '<div class="empty">встреч пока нет</div>';
        $("#transcriptPanel").style.display = "none";
        return;
      }
      el.innerHTML = `<table>
        <thead><tr><th>Начало</th><th>Конец</th><th>Длит.</th><th>Клиент</th><th>ID</th><th></th></tr></thead>
        <tbody>${meetings.map(m => `
          <tr>
            <td>${fmtTime(m.started_at)}</td>
            <td>${m.ended_at ? fmtTime(m.ended_at) : '<span class="badge meeting">🔴 идёт</span>'}</td>
            <td class="num">${m.duration_seconds != null ? fmtSec(m.duration_seconds) : '—'}</td>
            <td>${escapeHTML(m.client_name || '—')}</td>
            <td class="muted">${m.meeting_id}</td>
            <td>${m.ended_at ? `
              <button class="btn-sim" data-an="${m.meeting_id}">анализ</button>
              <button class="btn-sim" data-tx="${m.meeting_id}">транскрипт</button>` : ''}</td>
          </tr>`).join("")}</tbody>
      </table>`;
      el.querySelectorAll("[data-tx]").forEach(b => b.addEventListener("click", () => loadTranscript(b.dataset.tx)));
      el.querySelectorAll("[data-an]").forEach(b => b.addEventListener("click", () => loadAnalysis(b.dataset.an)));
    }

    function scoreClass(s) {
      if (s == null) return "low";
      if (s <= 4) return "low";
      if (s <= 7) return "mid";
      return "high";
    }
    function statusIcon(s) {
      if (s === "yes") return "✓";
      if (s === "no") return "✗";
      return "—";
    }

    async function loadAnalysis(meetingId) {
      const r = await fetch(`/meetings/${meetingId}/analysis`);
      const d = await r.json();
      const panel = $("#analysisPanel");
      panel.style.display = "block";
      $("#analysisMeetingId").textContent = "#" + meetingId;

      if (d.status === "pending") {
        $("#analysisScore").innerHTML = "";
        $("#analysisMeta").textContent = "LLM-анализ в очереди — обнови через 20-40 сек";
        $("#analysisContent").innerHTML = '<div class="empty">⏳ воркер работает...</div>';
        return;
      }

      const score = d.final_score;
      $("#analysisScore").innerHTML = score != null ? `<span class="score ${scoreClass(score)}">${score}/10</span>` : "";
      $("#analysisMeta").textContent = `модель: ${d.model} · обработано за ${(d.processing_time_seconds || 0).toFixed(1)} с`;

      const checklist = d.checklist || {};
      const sections = {};
      Object.entries(checklist).forEach(([id, item]) => {
        const sectionId = id.split(".")[0];
        if (!sections[sectionId]) sections[sectionId] = [];
        sections[sectionId].push({ id, ...item });
      });

      const sectionNames = { "1": "Приветствие", "2": "Выявление потребности", "3": "Презентация", "4": "Отработка возражений", "5": "Закрытие сделки" };

      let html = "";

      if (d.summary) {
        html += `<div class="summary-box">${escapeHTML(d.summary)}</div>`;
      }

      if (d.critical_errors && d.critical_errors.length) {
        html += `<h3 class="checklist-section">🚨 Грубые ошибки</h3>`;
        d.critical_errors.forEach(e => {
          html += `<div class="err-box"><strong>${escapeHTML(e.type || "ошибка")}</strong>${e.quote ? `<div class="quote">«${escapeHTML(e.quote)}»</div>` : ""}</div>`;
        });
      }

      html += '<div class="checklist-section">';
      Object.entries(sections).forEach(([sid, items]) => {
        html += `<h3>${sid}. ${sectionNames[sid] || ""}</h3>`;
        items.forEach(it => {
          html += `<div class="check-item">
            <div class="check-status ${it.status === "yes" ? "yes" : it.status === "no" ? "no" : "na"}">${statusIcon(it.status)}</div>
            <div>
              <div class="check-text">${escapeHTML(it.id)} ${escapeHTML(it.comment || "")}</div>
            </div>
          </div>`;
        });
      });
      html += "</div>";

      if ((d.strengths && d.strengths.length) || (d.growth_areas && d.growth_areas.length)) {
        html += `<div class="twocol">
          <div><h4>Сильные стороны</h4><ul>${(d.strengths || []).map(s => `<li>${escapeHTML(s)}</li>`).join("")}</ul></div>
          <div><h4>Зоны роста</h4><ul>${(d.growth_areas || []).map(s => `<li>${escapeHTML(s)}</li>`).join("")}</ul></div>
        </div>`;
      }

      $("#analysisContent").innerHTML = html;
      panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    async function loadTranscript(meetingId) {
      const r = await fetch(`/meetings/${meetingId}/transcript`);
      const d = await r.json();
      const panel = $("#transcriptPanel");
      panel.style.display = "block";
      $("#transcriptMeetingId").textContent = "#" + meetingId;
      if (d.status === "pending") {
        $("#transcriptMeta").textContent = "транскрипция в процессе — обнови через 10-30 сек";
        $("#transcriptText").innerHTML = '<div class="empty">⏳ ждём воркера...</div>';
        return;
      }
      const procRatio = d.duration_seconds && d.processing_time_seconds
        ? (d.duration_seconds / d.processing_time_seconds).toFixed(1) + "x realtime"
        : "";
      $("#transcriptMeta").textContent =
        `модель: ${d.model} · язык: ${d.language || "?"} · длительность: ${fmtSec(Math.round(d.duration_seconds || 0))} · обработано за ${(d.processing_time_seconds || 0).toFixed(1)} с (${procRatio})`;
      $("#transcriptText").textContent = d.text || "(пусто)";
      panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function renderDaySummary(d) {
      const el = $("#daySummary");
      const by = d.by_category || {};
      const tiles = `
        <div class="day-summary">
          <div class="day-tile work"><div class="label">работа</div><div class="value">${fmtSec(by.work || 0)}</div></div>
          <div class="day-tile meeting"><div class="label">встречи</div><div class="value">${fmtSec(d.meeting_seconds || 0)}</div></div>
          <div class="day-tile personal"><div class="label">личное</div><div class="value">${fmtSec(by.personal || 0)}</div></div>
          <div class="day-tile neutral"><div class="label">нейтр./не определено</div><div class="value">${fmtSec(by.neutral || 0)}</div></div>
        </div>`;
      if (!d.by_app.length) {
        el.innerHTML = tiles + '<div class="empty">пусто за этот период</div>';
        return;
      }
      const max = Math.max(...d.by_app.map(x => x.seconds));
      el.innerHTML = tiles + `
        <div class="muted" style="margin-bottom: 8px; font-size: 12px;">
          трекинг: ${fmtSec(d.total_tracked_seconds)} · встреч: ${d.meetings_count} · период: ${d.hours} ч
        </div>
        ${d.by_app.map(item => {
          const pct = max > 0 ? (item.seconds / max * 100).toFixed(1) : 0;
          return `<div class="bar-row">
            <div class="name">
              ${escapeHTML(item.app_name)}
              <select class="cat-select" data-app="${escapeHTML(item.app_name)}">
                <option value="work" ${item.category === 'work' ? 'selected' : ''}>работа</option>
                <option value="neutral" ${item.category === 'neutral' ? 'selected' : ''}>нейтр.</option>
                <option value="personal" ${item.category === 'personal' ? 'selected' : ''}>личное</option>
              </select>
            </div>
            <div class="bar-bg"><div class="bar-fill ${item.category}" style="width:${pct}%"></div></div>
            <div class="num">${fmtSec(item.seconds)}</div>
          </div>`;
        }).join("")}
      `;
      el.querySelectorAll(".cat-select").forEach(s => s.addEventListener("change", async () => {
        await fetch("/app_categories", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ app_name: s.dataset.app, category: s.value }),
        });
        loadAgentData();
      }));
    }

    function renderWindows(windows) {
      const el = $("#windows");
      if (!windows.length) {
        el.innerHTML = '<div class="empty">нет данных</div>';
        return;
      }
      el.innerHTML = `<table>
        <thead><tr><th>Время</th><th>Приложение</th><th>Заголовок окна</th><th class="num">Длительность</th></tr></thead>
        <tbody>${windows.map(w => `
          <tr>
            <td class="muted">${fmtTime(w.captured_at)}</td>
            <td>${escapeHTML(w.app_name)}</td>
            <td class="muted">${escapeHTML(w.title || "—")}</td>
            <td class="num">${fmtSec(w.duration_seconds)}</td>
          </tr>
        `).join("")}</tbody>
      </table>`;
    }

    function escapeHTML(s) {
      return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
    }

    $("#refresh").addEventListener("click", () => { loadAgents(); loadAgentData(); });
    $("#hours").addEventListener("change", loadAgentData);

    // восстанавливаем сохранённый токен
    const savedToken = localStorage.getItem("omToken");
    if (savedToken) $("#apiToken").value = savedToken;
    $("#apiToken").addEventListener("change", () => {
      localStorage.setItem("omToken", $("#apiToken").value.trim());
    });

    loadAgents();
    setInterval(() => { loadAgents(); loadAgentData(); }, 30000);
  </script>
</body>
</html>
